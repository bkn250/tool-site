  <link rel="stylesheet" href="../css/style.css">
  <style>
    .md-editor {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      min-height: 500px;
    }
    .md-editor textarea {
      min-height: 500px;
      resize: vertical;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      line-height: 1.7;
      font-size: 0.88rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      outline: none;
      transition: border-color var(--transition);
    }
    .md-editor textarea:focus {
      border-color: var(--primary);
    }
    .md-preview {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 24px;
      overflow-y: auto;
      min-height: 500px;
      background: var(--bg-card);
      line-height: 1.8;
    }
    .md-preview h1, .md-preview h2, .md-preview h3 { margin-top: 1.2em; margin-bottom: 0.5em; font-weight: 600; }
    .md-preview h1 { font-size: 1.8rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    .md-preview h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    .md-preview h3 { font-size: 1.15rem; }
    .md-preview p { margin-bottom: 0.8em; }
    .md-preview code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .md-preview pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      overflow-x: auto;
    }
    .md-preview pre code { background: none; padding: 0; }
    .md-preview blockquote {
      border-left: 4px solid var(--primary);
      padding-left: 16px;
      color: var(--text-secondary);
      margin: 1em 0;
    }
    .md-preview table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }
    .md-preview th, .md-preview td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .md-preview th { background: var(--bg); font-weight: 600; }
    .md-preview img { max-width: 100%; border-radius: 4px; }
    .md-preview ul, .md-preview ol { padding-left: 2em; margin-bottom: 0.8em; }
    .md-preview a { color: var(--primary); }
    @media (max-width: 768px) {
      .md-editor { grid-template-columns: 1fr; }
      .md-editor textarea { min-height: 300px; }
      .md-preview { min-height: 300px; }
    }
  </style>
