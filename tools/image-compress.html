<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线图片压缩 - 免费压缩JPEG/PNG/WebP</title>
  <meta name="description" content="免费在线图片压缩工具，支持 JPEG、PNG、WebP 格式，浏览器端处理不上传服务器，保护你的隐私。">
  <link rel="stylesheet" href="../css/style.css">
  <!-- 百度统计 -->
  <script>
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?你的百度统计ID";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
  </script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-logo">
        <span class="logo-icon">🔧</span>
        <span>在线工具箱</span>
      </a>
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
      </div>
    </div>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <a href="../index.html" style="font-size:0.85rem;color:var(--text-muted);">← 返回首页</a>
      <h1>🖼️ 在线图片压缩</h1>
      <p>压缩 JPEG、PNG、WebP 图片，所有处理在浏览器本地完成，不上传服务器。</p>
    </div>

    <!-- 广告位 -->
    <div class="ad-container">📢 广告位招租</div>

    <div class="tool-body">
      <!-- 上传区域 -->
      <div class="file-upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <p>拖拽图片到这里，或 <strong>点击选择</strong></p>
        <p style="font-size:0.8rem;margin-top:8px;">支持 JPG、PNG、WebP，最大 20MB</p>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
      </div>

      <!-- 压缩控制 -->
      <div id="controlPanel" style="display:none;">
        <div class="form-group" style="margin-top:20px;">
          <label>压缩质量</label>
          <div class="range-control">
            <input type="range" id="qualitySlider" min="1" max="100" value="80">
            <span class="range-value" id="qualityValue">80%</span>
          </div>
        </div>

        <div class="form-group">
          <label>输出格式</label>
          <select id="formatSelect">
            <option value="image/jpeg">JPEG</option>
            <option value="image/png">PNG</option>
            <option value="image/webp">WebP</option>
          </select>
        </div>

        <div class="preview-container">
          <div class="preview-box">
            <h4>压缩前</h4>
            <img id="originalPreview" src="" alt="原始图片">
            <div class="file-info" id="originalInfo"></div>
          </div>
          <div class="preview-box">
            <h4>压缩后</h4>
            <img id="compressedPreview" src="" alt="压缩后图片">
            <div class="file-info" id="compressedInfo"></div>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="downloadBtn">📥 下载压缩后的图片</button>
          <button class="btn btn-secondary" id="resetBtn">🔄 重新选择</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>© 2024 在线工具箱 · 图片处理全程在本地浏览器完成</p>
    </div>
  </footer>

  <div class="copy-toast" id="copyToast">✅ 已复制</div>
  <script src="../js/main.js"></script>
  <script src="../js/tools/image-compress.js"></script>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</body>
</html>
