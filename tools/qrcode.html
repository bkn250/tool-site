<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线二维码生成器 - 免费生成二维码</title>
  <meta name="description" content="免费在线二维码生成器，支持文本、网址、WiFi信息生成二维码，可下载高清PNG图片。">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-logo">
        <span class="logo-icon">🔧</span>
        <span>在线工具箱</span>
      </a>
      <div class="navbar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
      </div>
    </div>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <a href="../index.html" style="font-size:0.85rem;color:var(--text-muted);">← 返回首页</a>
      <h1>📱 二维码生成器</h1>
      <p>将文本、网址、WiFi 配置等信息生成二维码，支持下载高清 PNG。</p>
    </div>

    <div class="ad-container">📢 广告位招租</div>

    <div class="tool-body">
      <!-- Tab 切换 -->
      <div class="tabs">
        <button class="tab active" data-tab="text">文本</button>
        <button class="tab" data-tab="url">网址</button>
        <button class="tab" data-tab="wifi">WiFi</button>
        <button class="tab" data-tab="vcard">名片</button>
      </div>

      <!-- 文本输入 -->
      <div class="tab-content" id="tab-text">
        <div class="form-group">
          <label>输入内容</label>
          <textarea id="textInput" rows="4" placeholder="输入要生成二维码的文本内容..." style="min-height:100px;font-family:inherit;">https://example.com</textarea>
        </div>
      </div>

      <!-- 网址输入 -->
      <div class="tab-content" id="tab-url" style="display:none;">
        <div class="form-group">
          <label>网址链接</label>
          <input type="text" id="urlInput" placeholder="https://example.com" value="https://example.com">
        </div>
      </div>

      <!-- WiFi 输入 -->
      <div class="tab-content" id="tab-wifi" style="display:none;">
        <div class="form-group">
          <label>WiFi 名称 (SSID)</label>
          <input type="text" id="wifiSsid" placeholder="输入WiFi名称">
        </div>
        <div class="form-group">
          <label>WiFi 密码</label>
          <input type="text" id="wifiPassword" placeholder="输入WiFi密码">
        </div>
        <div class="form-group">
          <label>加密方式</label>
          <select id="wifiEncryption">
            <option value="WPA">WPA/WPA2</option>
            <option value="WEP">WEP</option>
            <option value="">无加密</option>
          </select>
        </div>
      </div>

      <!-- 名片输入 -->
      <div class="tab-content" id="tab-vcard" style="display:none;">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="vcardName" placeholder="姓名">
        </div>
        <div class="form-group">
          <label>电话</label>
          <input type="text" id="vcardPhone" placeholder="手机号码">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="text" id="vcardEmail" placeholder="邮箱地址">
        </div>
        <div class="form-group">
          <label>公司</label>
          <input type="text" id="vcardOrg" placeholder="公司名称">
        </div>
      </div>

      <!-- QR 码展示 -->
      <div style="text-align:center;margin:24px 0;">
        <div id="qrcodeContainer" style="display:inline-block;padding:16px;background:white;border-radius:8px;">
          <canvas id="qrcodeCanvas"></canvas>
        </div>
        <p id="qrcodeHint" style="font-size:0.85rem;color:var(--text-muted);margin-top:8px;">输入内容后自动生成</p>
      </div>

      <div class="btn-group" style="justify-content:center;">
        <button class="btn btn-primary" id="downloadQrBtn">📥 下载二维码 (PNG)</button>
        <button class="btn btn-secondary" id="copyQrBtn">📋 复制二维码</button>
      </div>

      <div class="form-group" style="margin-top:16px;">
        <label>二维码内容预览</label>
        <textarea id="qrContentPreview" rows="2" readonly style="min-height:40px;font-family:inherit;background:var(--bg);"></textarea>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>© 2024 在线工具箱 · 二维码生成全程在本地完成</p>
    </div>
  </footer>

  <div class="copy-toast" id="copyToast">✅ 已复制</div>
  <script src="../js/main.js"></script>
  <script src="../js/tools/qrcode.js"></script>
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</body>
</html>
